<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" fill="none">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity=".06"/>
    </filter>
    <filter id="shadow-sm" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity=".05"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FEF2F2"/>
      <stop offset="100%" stop-color="#FFF7ED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" rx="16" fill="url(#bg)"/>

  <!-- Window frame -->
  <g filter="url(#shadow)">
    <rect x="40" y="30" width="880" height="480" rx="12" fill="#fff"/>
  </g>

  <!-- Window bar -->
  <rect x="40" y="30" width="880" height="40" rx="12" fill="#F8FAFC"/>
  <rect x="40" y="58" width="880" height="12" fill="#F8FAFC"/>
  <circle cx="64" cy="50" r="6" fill="#FF5F57"/>
  <circle cx="82" cy="50" r="6" fill="#FFBD2E"/>
  <circle cx="100" cy="50" r="6" fill="#28C840"/>
  <text x="480" y="54" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">app.uxcam.com / settings / alerts</text>

  <!-- Page title -->
  <text x="72" y="100" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#0F172A">Alerts</text>
  <text x="72" y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8">Get notified when metrics cross your thresholds</text>

  <!-- Create Alert button -->
  <rect x="780" y="84" width="116" height="34" rx="8" fill="#EF4444"/>
  <text x="838" y="106" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">+ Create Alert</text>

  <!-- Divider -->
  <line x1="72" y1="132" x2="888" y2="132" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ===== Alert Builder Card ===== -->
  <g filter="url(#shadow-sm)">
    <rect x="72" y="144" width="500" height="240" rx="10" fill="#F8FAFC" stroke="#FECACA" stroke-width="1.5"/>
  </g>

  <!-- Builder header -->
  <rect x="72" y="144" width="500" height="36" rx="10" fill="#FEF2F2"/>
  <rect x="72" y="170" width="500" height="10" fill="#FEF2F2"/>
  <text x="92" y="168" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#991B1B">New Alert</text>

  <!-- Metric selection -->
  <text x="92" y="206" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748B">Metric</text>
  <rect x="92" y="212" width="180" height="28" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
  <text x="104" y="231" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F172A">Crash rate</text>
  <text x="254" y="231" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8">&#9662;</text>

  <!-- Condition -->
  <text x="286" y="206" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748B">Condition</text>
  <rect x="286" y="212" width="120" height="28" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
  <text x="298" y="231" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F172A">exceeds</text>
  <text x="388" y="231" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8">&#9662;</text>

  <!-- Threshold -->
  <text x="420" y="206" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748B">Threshold</text>
  <rect x="420" y="212" width="70" height="28" rx="6" fill="#fff" stroke="#EF4444" stroke-width="1.5"/>
  <text x="432" y="231" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#EF4444">2.0%</text>

  <!-- Comparison window -->
  <text x="92" y="262" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748B">Compare to</text>
  <rect x="92" y="268" width="150" height="28" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
  <text x="104" y="287" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F172A">Previous 7 days</text>
  <text x="224" y="287" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8">&#9662;</text>

  <!-- Platform filter -->
  <text x="256" y="262" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748B">Platform</text>
  <rect x="256" y="268" width="100" height="28" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
  <text x="268" y="287" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F172A">All platforms</text>

  <!-- Delivery channels -->
  <text x="92" y="318" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748B">Notify via</text>

  <!-- Email chip (active) -->
  <rect x="92" y="324" width="62" height="26" rx="13" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="123" y="341" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#1D4ED8" text-anchor="middle">Email</text>

  <!-- Slack chip (active) -->
  <rect x="162" y="324" width="62" height="26" rx="13" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="193" y="341" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#1D4ED8" text-anchor="middle">Slack</text>

  <!-- In-app chip (inactive) -->
  <rect x="232" y="324" width="62" height="26" rx="13" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="263" y="341" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#94A3B8" text-anchor="middle">In-app</text>

  <!-- Save button -->
  <rect x="440" y="350" width="100" height="30" rx="6" fill="#0F172A"/>
  <text x="490" y="370" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Save Alert</text>

  <!-- ===== Threshold Chart ===== -->
  <g filter="url(#shadow-sm)">
    <rect x="590" y="144" width="306" height="160" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
  </g>

  <text x="610" y="168" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F172A">Crash Rate Preview</text>
  <text x="830" y="168" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="end">Last 14 days</text>

  <!-- Chart area -->
  <!-- Y axis labels -->
  <text x="610" y="195" font-family="JetBrains Mono, monospace" font-size="9" fill="#CBD5E1">3%</text>
  <text x="610" y="225" font-family="JetBrains Mono, monospace" font-size="9" fill="#CBD5E1">2%</text>
  <text x="610" y="255" font-family="JetBrains Mono, monospace" font-size="9" fill="#CBD5E1">1%</text>
  <text x="610" y="285" font-family="JetBrains Mono, monospace" font-size="9" fill="#CBD5E1">0%</text>

  <!-- Grid lines -->
  <line x1="632" y1="191" x2="876" y2="191" stroke="#F1F5F9" stroke-width="1"/>
  <line x1="632" y1="221" x2="876" y2="221" stroke="#F1F5F9" stroke-width="1"/>
  <line x1="632" y1="251" x2="876" y2="251" stroke="#F1F5F9" stroke-width="1"/>
  <line x1="632" y1="281" x2="876" y2="281" stroke="#F1F5F9" stroke-width="1"/>

  <!-- Threshold line (at 2%) -->
  <line x1="632" y1="221" x2="876" y2="221" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="856" y="213" width="28" height="16" rx="3" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="870" y="225" font-family="JetBrains Mono, monospace" font-size="8" fill="#EF4444" text-anchor="middle">2%</text>

  <!-- Metric line (mostly under threshold, spiking above at end) -->
  <polyline points="636,265 656,262 676,258 696,255 716,260 736,254 748,248 756,240 764,232 772,218 780,208 788,198 796,210 806,226 816,238 826,252 836,258 846,260 856,262 866,258 876,261" stroke="#3B82F6" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Breach zone highlight -->
  <rect x="764" y="191" width="36" height="30" rx="0" fill="#FEF2F2" opacity=".5"/>

  <!-- Breach indicator dot -->
  <circle cx="780" cy="208" r="4" fill="#EF4444"/>
  <circle cx="780" cy="208" r="7" fill="none" stroke="#EF4444" stroke-width="1" opacity=".4"/>

  <!-- X axis labels -->
  <text x="656" y="296" font-family="JetBrains Mono, monospace" font-size="8" fill="#CBD5E1" text-anchor="middle">Jun 12</text>
  <text x="736" y="296" font-family="JetBrains Mono, monospace" font-size="8" fill="#CBD5E1" text-anchor="middle">Jun 16</text>
  <text x="816" y="296" font-family="JetBrains Mono, monospace" font-size="8" fill="#CBD5E1" text-anchor="middle">Jun 20</text>
  <text x="876" y="296" font-family="JetBrains Mono, monospace" font-size="8" fill="#CBD5E1" text-anchor="middle">Jun 25</text>

  <!-- ===== Notification Cards ===== -->
  <g filter="url(#shadow-sm)">
    <rect x="590" y="316" width="306" height="68" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
  </g>

  <!-- Alert card: critical -->
  <text x="610" y="337" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F172A">Recent Alerts</text>

  <rect x="604" y="346" width="278" height="30" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <circle cx="618" cy="361" r="8" fill="#EF4444"/>
  <text x="618" y="365" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">!</text>
  <text x="632" y="365" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#991B1B">Crash rate exceeded 2%</text>
  <text x="870" y="365" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#EF4444" text-anchor="end">12m ago</text>

  <!-- ===== Active Alerts Table ===== -->
  <!-- Table header -->
  <rect x="72" y="400" width="824" height="30" rx="0" fill="#F8FAFC"/>
  <text x="92" y="420" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748B" letter-spacing=".04em">ALERT NAME</text>
  <text x="320" y="420" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748B" letter-spacing=".04em">METRIC</text>
  <text x="480" y="420" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748B" letter-spacing=".04em">CONDITION</text>
  <text x="640" y="420" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748B" letter-spacing=".04em">CHANNELS</text>
  <text x="800" y="420" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748B" letter-spacing=".04em">STATUS</text>

  <!-- Row 1 -->
  <line x1="72" y1="430" x2="896" y2="430" stroke="#F1F5F9" stroke-width="1"/>
  <text x="92" y="450" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F172A">Crash rate spike</text>
  <text x="320" y="450" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748B">Crash rate</text>
  <text x="480" y="450" font-family="JetBrains Mono, monospace" font-size="10" fill="#334155">exceeds 2.0%</text>
  <text x="640" y="450" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748B">Email, Slack</text>
  <rect x="800" y="438" width="52" height="20" rx="10" fill="#DCFCE7"/>
  <text x="826" y="452" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#166534" text-anchor="middle">Active</text>

  <!-- Row 2 -->
  <line x1="72" y1="464" x2="896" y2="464" stroke="#F1F5F9" stroke-width="1"/>
  <text x="92" y="484" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F172A">Traffic drop</text>
  <text x="320" y="484" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748B">Session count</text>
  <text x="480" y="484" font-family="JetBrains Mono, monospace" font-size="10" fill="#334155">drops 20% vs 7d</text>
  <text x="640" y="484" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748B">Slack</text>
  <rect x="800" y="472" width="52" height="20" rx="10" fill="#DCFCE7"/>
  <text x="826" y="486" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#166534" text-anchor="middle">Active</text>

  <!-- Row 3 -->
  <line x1="72" y1="498" x2="896" y2="498" stroke="#F1F5F9" stroke-width="1"/>

</svg>
