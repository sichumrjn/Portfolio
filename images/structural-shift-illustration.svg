<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" fill="none">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity=".06"/>
    </filter>
    <filter id="shadow-sm" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity=".05"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0F1FA"/>
      <stop offset="100%" stop-color="#E8EAF6"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="16" fill="url(#bg)"/>

  <!-- Labels -->
  <text x="185" y="52" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#64748B" letter-spacing=".08em" text-anchor="middle">BEFORE</text>
  <text x="720" y="52" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6366F1" letter-spacing=".08em" text-anchor="middle">AFTER</text>

  <!-- ===== LEFT: Flat List ===== -->
  <g filter="url(#shadow)">
    <rect x="60" y="76" width="250" height="380" rx="12" fill="#fff"/>
  </g>

  <!-- Header -->
  <rect x="60" y="76" width="250" height="44" rx="12" fill="#F8FAFC"/>
  <rect x="60" y="108" width="250" height="12" fill="#F8FAFC"/>
  <text x="84" y="104" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">All Apps</text>
  <line x1="60" y1="120" x2="310" y2="120" stroke="#E2E8F0" stroke-width="1"/>

  <!-- App items (flat list) -->
  <g>
    <!-- App 1 -->
    <rect x="76" y="132" width="218" height="40" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="90" y="144" width="16" height="16" rx="4" fill="#818CF8"/>
    <text x="114" y="156" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155">Shopping App - Prod</text>

    <!-- App 2 -->
    <rect x="76" y="180" width="218" height="40" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="90" y="192" width="16" height="16" rx="4" fill="#818CF8"/>
    <text x="114" y="204" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155">Shopping App - Staging</text>

    <!-- App 3 -->
    <rect x="76" y="228" width="218" height="40" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="90" y="240" width="16" height="16" rx="4" fill="#818CF8"/>
    <text x="114" y="252" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155">Banking App - Prod</text>

    <!-- App 4 -->
    <rect x="76" y="276" width="218" height="40" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="90" y="288" width="16" height="16" rx="4" fill="#818CF8"/>
    <text x="114" y="300" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155">Banking App - Testing</text>

    <!-- App 5 -->
    <rect x="76" y="324" width="218" height="40" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="90" y="336" width="16" height="16" rx="4" fill="#818CF8"/>
    <text x="114" y="348" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155">Loyalty App - Prod</text>

    <!-- App 6 -->
    <rect x="76" y="372" width="218" height="40" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="90" y="384" width="16" height="16" rx="4" fill="#818CF8"/>
    <text x="114" y="396" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155">Loyalty App - Staging</text>
  </g>

  <!-- Confusion indicator -->
  <text x="185" y="440" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">No grouping, no structure</text>

  <!-- ===== ARROW ===== -->
  <g>
    <line x1="340" y1="266" x2="430" y2="266" stroke="url(#arrow-grad)" stroke-width="2.5" stroke-dasharray="6 4"/>
    <polygon points="430,258 448,266 430,274" fill="#6366F1"/>
  </g>

  <!-- ===== RIGHT: Three-Level Hierarchy ===== -->

  <!-- Organization node -->
  <g filter="url(#shadow)">
    <rect x="500" y="76" width="400" height="400" rx="12" fill="#fff"/>
  </g>

  <!-- Org header -->
  <rect x="500" y="76" width="400" height="48" rx="12" fill="#6366F1"/>
  <rect x="500" y="112" width="400" height="12" fill="#6366F1"/>
  <circle cx="526" cy="100" r="12" fill="rgba(255,255,255,.2)"/>
  <text x="526" y="104" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">O</text>
  <text x="546" y="105" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">Acme Corp</text>
  <text x="860" y="105" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,.7)" text-anchor="end">Organization</text>

  <!-- Project A -->
  <g filter="url(#shadow-sm)">
    <rect x="524" y="140" width="352" height="144" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  </g>

  <!-- Project A header -->
  <rect x="524" y="140" width="352" height="36" rx="10" fill="#EEF2FF"/>
  <rect x="524" y="166" width="352" height="10" fill="#EEF2FF"/>
  <circle cx="546" cy="158" r="10" fill="#818CF8"/>
  <text x="546" y="162" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">P</text>
  <text x="564" y="163" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4338CA">Shopping App</text>
  <text x="852" y="163" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="end">Project</text>

  <!-- Environment items for Project A -->
  <rect x="544" y="188" width="156" height="34" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <circle cx="558" cy="205" r="5" fill="#22C55E"/>
  <text x="570" y="209" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#166534">Production</text>
  <text x="690" y="209" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="end">Env</text>

  <rect x="544" y="230" width="156" height="34" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <circle cx="558" cy="247" r="5" fill="#F59E0B"/>
  <text x="570" y="251" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#92400E">Staging</text>
  <text x="690" y="251" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#FCD34D" text-anchor="end">Env</text>

  <rect x="712" y="188" width="156" height="34" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <circle cx="726" cy="205" r="5" fill="#3B82F6"/>
  <text x="738" y="209" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#1E40AF">Testing</text>
  <text x="858" y="209" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#93C5FD" text-anchor="end">Env</text>

  <!-- Project B -->
  <g filter="url(#shadow-sm)">
    <rect x="524" y="300" width="352" height="102" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  </g>

  <!-- Project B header -->
  <rect x="524" y="300" width="352" height="36" rx="10" fill="#EEF2FF"/>
  <rect x="524" y="326" width="352" height="10" fill="#EEF2FF"/>
  <circle cx="546" cy="318" r="10" fill="#818CF8"/>
  <text x="546" y="322" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">P</text>
  <text x="564" y="323" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4338CA">Banking App</text>
  <text x="852" y="323" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="end">Project</text>

  <!-- Environment items for Project B -->
  <rect x="544" y="348" width="156" height="34" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <circle cx="558" cy="365" r="5" fill="#22C55E"/>
  <text x="570" y="369" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#166534">Production</text>
  <text x="690" y="369" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#86EFAC" text-anchor="end">Env</text>

  <rect x="712" y="348" width="156" height="34" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <circle cx="726" cy="365" r="5" fill="#3B82F6"/>
  <text x="738" y="369" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#1E40AF">Testing</text>
  <text x="858" y="369" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#93C5FD" text-anchor="end">Env</text>

  <!-- Structured label -->
  <text x="700" y="496" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6366F1" text-anchor="middle">Organization → Project → Environment</text>
</svg>
